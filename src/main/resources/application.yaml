spring:
  application:
    name: crudStudent

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

  prometheus:
    metrics:
      export:
        enabled: true

  metrics:
    tags:
      application: crud-iphone