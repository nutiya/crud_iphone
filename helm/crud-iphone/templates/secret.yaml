apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: {{ .Values.namespace }}
type: Opaque
data:
  {{- if .Values.secret.postgresPassword }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgresPassword | b64enc | quote }}
  {{- else }}
  {{- fail "secret.postgresPassword is required. Pass it with --set secret.postgresPassword=yourpassword" }}
  {{- end }}
